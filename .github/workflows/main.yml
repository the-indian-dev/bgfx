name: Build bgfx tools (Linux)

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: true
      matrix:
        include:
          - config: debug
            binsuffix: Debug
          - config: release
            binsuffix: Release

    name: linux-gcc-${{ matrix.config }}

    steps:
      - name: Checkout bgfx
        uses: actions/checkout@v4
        with:
          path: bgfx

      - name: Checkout bx
        uses: actions/checkout@v4
        with:
          repository: bkaradzic/bx
          path: bx

      - name: Checkout bimg
        uses: actions/checkout@v4
        with:
          repository: bkaradzic/bimg
          path: bimg

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libgl-dev

      - name: Build
        run: |
          cd bgfx
          make -j$(nproc) linux-gcc-${{ matrix.config }}64

      - name: Verify
        run: |
          cd bgfx
          ls -lah .build/linux64_gcc/bin
          .build/linux64_gcc/bin/shaderc${{ matrix.binsuffix }} --version
          .build/linux64_gcc/bin/geometryc${{ matrix.binsuffix }} --version
          .build/linux64_gcc/bin/texturec${{ matrix.binsuffix }} --version

      - name: Package tools
        run: |
          cd bgfx/.build/linux64_gcc
          tar -czf bgfx-tools-${{ matrix.config }}.tar.gz bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgfx-linux-${{ matrix.config }}
          path: bgfx/.build/linux64_gcc/bgfx-tools-${{ matrix.config }}.tar.gz
